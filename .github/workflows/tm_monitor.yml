name: Monitor USPTO TM Status

on:
  schedule:
    # Runs every day at 15:00 UTC (~7am PT / 10am ET, adjust as you like)
    - cron: "0 15 * * *"
  workflow_dispatch: {}

jobs:
  check-status:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # allow workflow to update status.json if needed

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: List files
        run: |
          pwd
          ls -R

      - name: Run monitor script
        env:
          USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python monitor_tm.py

      - name: Commit updated status.json (if changed)
        run: |
          if [[ -n "$(git status --porcelain status.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add status.json
            git commit -m "Update status for 99155993"
            git push
          else
            echo "No changes to status.json"
          fi
